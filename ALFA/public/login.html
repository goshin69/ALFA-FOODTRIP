<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión · Koalicius</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/login.css">
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card">
            <div class="login-header">
                <img src="imageness/Koalii.png" alt="Koalicius" class="logo-login">
                <h1>Bienvenido de nuevo</h1>
                <p>Ingresa tus datos para continuar</p>
            </div>

            <form id="login-form" class="login-form">
                <div class="campo">
                    <label for="email">
                        <i class="fa-regular fa-envelope"></i> Correo electrónico
                    </label>
                    <input type="email" id="email" name="email" placeholder="ejemplo@correo.com" required>
                </div>

                <div class="campo password-field">
                    <label for="password">
                        <i class="fa-solid fa-lock fa-2x"></i> Contraseña
                    </label>
                    <div class="password-wrapper">
                        <input type="password" id="password" name="password" placeholder="••••••••" required>
                        <button type="button" class="toggle-password" aria-label="Mostrar contraseña">
                            <i class="fa-regular fa-eye"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn-login" id="btnLogin">
                    <span class="btn-text">Iniciar sesión</span>
                    <span class="btn-loader" style="display: none;"><i class="fa-solid fa-circle-notch fa-spin"></i> Ingresando...</span>
                </button>
            </form>

            <div id="mensaje" class="mensaje"></div>

            <div class="registro-link">
                ¿No tienes cuenta? <a href="registro.html">Crea una aquí</a>
            </div>
        </div>
    </div>

    <script src="assets/js/login.js"></script>
</body>
</html>
