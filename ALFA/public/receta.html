<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle de Receta - Koalicius</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <div id="loader-wrapper">
        <div class="loader"></div>
    </div>

    <header>
        <div class="logo">
            <i class="fa-solid fa-utensils"></i>
            <span>Koalicius</span>
        </div>
        <div class="search-bar">
            <i class="fa-solid fa-search"></i>
            <input type="text" placeholder="Buscar recetas...">
        </div>
        <div class="user-profile">
            <i class="fa-solid fa-user"></i>
        </div>
    </header>

    <nav id="main-nav">
        <a href="index.html" class="nav-item"><i class="fa-solid fa-house"></i> Inicio</a>
        <a href="tendencia.html" class="nav-item"><i class="fa-solid fa-fire"></i> Tendencia</a>
        <a href="videos.html" class="nav-item"><i class="fa-solid fa-play"></i> Videos</a>
        <a href="notificacion.html" class="nav-item"><i class="fa-solid fa-bell"></i> Notificación</a>
        <a href="crear_receta.html" class="nav-item"><i class="fa-solid fa-utensils"></i> Crear Receta</a>
        <a href="configuracion.html" class="nav-item"><i class="fa-solid fa-gear"></i> Configuración</a>
    </nav>

    <main>
        <div id="receta-detalle"></div>
        <hr>
        <h3>Comentarios</h3>
        <div id="comentarios-lista"></div>
        <h3>Deja tu comentario</h3>
        <div id="error" style="color:red"></div>
        <form id="comentario-form">
            <input type="hidden" name="receta_id" id="receta-id-input">
            <label>Puntuación:</label><br>
            <select name="puntuacion" required>
                <option value="">Selecciona</option>
                <option value="0">0</option>
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
                <option value="5">5</option>
            </select><br><br>
            <label>Comentario:</label><br>
            <textarea name="comentario" rows="4" cols="50" required></textarea><br><br>
            <button type="submit">Publicar comentario</button>
        </form>
        <p><a href="index.html">← Volver al inicio</a></p>
    </main>

    <script src="assets/js/detalle_receta.js"></script>
</body>
</html>
