<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Perfil de Usuario</title>
  <link rel="stylesheet" href="perfil.css">
</head>
<body>
    
  <!-- Perfil -->
  <div id="VerPerfil">
    <h2>Perfil</h2>
    <img id="fotoPerfil" src="OIP.webp" alt="foto de perfil">
    <p><strong id="Tnombre">Nombre:</strong> <span id="nombrePerfil">Usuario</span></p>
    <p><strong id="Tcorreo"></strong> <span id="correoPerfil"></span></p>
    <p> <span id="descripcionPerfil">Descriccion</span></p>
    <button onclick="abrirEditor()">Editar Perfil</button>
  </div>

  <!-- Editor oculto -->
<div id="editorModal" class="modal">
  <div class="modal-content">
    <span class="cerrar" onclick="cerrarEditor()">&times;</span>
    <h2>Editar perfil</h2>
    <form onsubmit="guardarCambios(event)">
      <label>Nombre:</label>
      <input type="text" id="nuevoNombre" maxlength="20"><br>

      <label>Correo:</label>
      <input type="email" id="nuevoCorreo"><br>

      <label>Descripción:</label>
      <input type="text" id="nuevaDescripcion"><br>

      <button type="submit">Guardar cambios</button>
    </form>
  </div>
</div>


<script src="scits_usuario.js"></script>  
 
</body>
</html>
